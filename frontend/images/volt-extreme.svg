
<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad-volt-extreme" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
        </linearGradient>
    </defs>
    <!-- Can Body -->
    <rect x="40" y="20" width="120" height="260" rx="15" ry="15" fill="url(#grad-volt-extreme)" stroke="#333" stroke-width="2"/>
    <!-- Lid -->
    <ellipse cx="100" cy="20" rx="60" ry="10" fill="#ddd" stroke="#333" stroke-width="2"/>
    <!-- Bottom Rim -->
    <path d="M 40 280 A 60 10 0 0 0 160 280" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Logo/Text -->
    <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#111" transform="rotate(-90 100 150)">VOLT</text>
    <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-size="14" fill="#111" transform="rotate(-90 100 150)">EXTREME</text>
    <!-- Lightning Bolt -->
    <path d="M 95 120 L 125 120 L 90 180 L 110 180 L 80 240 L 100 170 L 75 170 Z" fill="#fff" stroke="#000" stroke-width="1"/>
</svg>